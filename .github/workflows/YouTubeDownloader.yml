name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 YouTube Video URL'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    timeout-minutes: 30                          # global safety net
    permissions:
      contents: write

    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies (with retry)
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "🔄 apt-get attempt $i..."
            sudo apt-get update && sudo apt-get install -y zip curl jq ffmpeg && break || sleep 10
          done
          pip install requests

      - name: 🎯 Request Conversion via API
        id: converter
        run: |
          set -euo pipefail
          python3 << 'PYEOF'
          import os, sys, json, time, re
          import requests

          YT_URL = os.environ['YT_URL']
          OUTPUT_TYPE = os.environ['OUTPUT_TYPE']
          QUALITY = os.environ.get('QUALITY', '720p')

          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 150          # ~5 minutes, extendable
          RETRY_MAX = 3

          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']

          # ------ robustness helpers ------
          def safe_json(resp):
              try:
                  return resp.json()
              except Exception:
                  print(f"❌ Non-JSON response (HTTP {resp.status_code}): {resp.text[:300]}")
                  sys.exit(1)

          def retryable_request(method, url, session, **kwargs):
              last_exc = None
              for i in range(RETRY_MAX):
                  try:
                      resp = session.request(method, url, timeout=30, **kwargs)
                      if resp.status_code < 500 and resp.status_code != 429:
                          return resp
                      print(f"⚠️ Retriable status {resp.status_code} – attempt {i+1}/{RETRY_MAX}")
                  except requests.RequestException as e:
                      last_exc = e
                      print(f"⚠️ Request error, retry {i+1}/{RETRY_MAX}: {e}")
                  time.sleep((2 ** i) * 1.5)
              if last_exc:
                  raise last_exc
              return resp   # return the last failed response anyway

          # ------ quality normalization (with 4k mapping fix) ------
          def normalize_quality(output_type, quality_input):
              try:
                  quality = quality_input.lower().strip()
                  if output_type == 'audio':
                      quality = quality.replace('p', '')
                      if 'kbps' not in quality:
                          quality = quality.rstrip('k') + 'kbps' if quality.endswith('k') else quality + 'kbps'
                      if quality in AUDIO_BITRATES:
                          return quality
                      # fallback by nearest bitrate
                      try:
                          num = int(''.join(filter(str.isdigit, quality)))
                          best = min(AUDIO_BITRATES, key=lambda b: abs(int(''.join(filter(str.isdigit, b))) - num))
                      except:
                          best = '192kbps'
                      print(f"🔄 Audio fallback from '{quality_input}' → {best}")
                      return best
                  else:  # video
                      # preserve special mappings before mutation
                      quality_map = {'4k':'1080p','2k':'1080p','2160p':'1080p','1440p':'1080p','240p':'360p'}
                      if quality in quality_map:
                          return quality_map[quality]
                      quality = quality.replace('k', '')
                      if not quality.endswith('p'):
                          quality += 'p'
                      if quality in VIDEO_QUALITIES:
                          return quality
                      # try mapping again after normalisation
                      if quality in quality_map:
                          return quality_map[quality]
                      print(f"🔄 Video fallback from '{quality_input}' → 720p")
                      return '720p'
              except Exception:
                  return '720p' if output_type == 'video' else '192kbps'

          QUALITY = normalize_quality(OUTPUT_TYPE, QUALITY)

          print(f"🎯 Target: {OUTPUT_TYPE.upper()} @ {QUALITY}")
          print("="*50)

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }

          session = requests.Session()

          # preflight inside protected block
          try:
              session.get("https://media.ytmp3.gg/", headers=HEADERS, timeout=15)
          except requests.RequestException as e:
              print(f"❌ Preflight failed: {e}")
              sys.exit(1)

          payload = {
              "url": YT_URL,
              "os": "linux",
              "output": {
                  "type": OUTPUT_TYPE,
                  "format": "mp3" if OUTPUT_TYPE == 'audio' else "mp4",
              }
          }
          if OUTPUT_TYPE == 'audio':
              payload["audio"] = {"bitrate": QUALITY}
          else:
              payload["output"]["quality"] = QUALITY

          print(f"📤 Requesting conversion...")
          print(f"📋 Payload: {json.dumps(payload, indent=2)}")

          # initial POST with retry logic
          try:
              response = retryable_request("POST", API_ENDPOINT, session, json=payload, headers=HEADERS)
              if response.status_code != 200:
                  print(f"❌ API error ({response.status_code}): {response.text[:300]}")
                  if response.status_code == 400:
                      # one quality fallback attempt
                      if OUTPUT_TYPE == 'audio':
                          payload["audio"]["bitrate"] = "192kbps"
                      else:
                          payload["output"]["quality"] = "720p"
                      response = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                      if response.status_code != 200:
                          print(f"❌ Fallback also failed ({response.status_code})")
                          sys.exit(1)
                  else:
                      sys.exit(1)
              data = safe_json(response)
          except requests.RequestException as e:
              print(f"❌ Request failed: {e}")
              sys.exit(1)

          status_url = data.get('statusUrl')
          title = data.get('title', 'youtube_video')
          if not status_url:
              print("❌ No statusUrl in response")
              print(json.dumps(data, indent=2))
              sys.exit(1)

          print(f"✅ Registered: {title}")
          print("="*50)

          # polling with extended attempts
          download_url = None
          for attempt in range(1, MAX_ATTEMPTS+1):
              time.sleep(STATUS_CHECK_INTERVAL)
              print(f"🔄 Status [{attempt}/{MAX_ATTEMPTS}]...", end=' ')
              try:
                  status_resp = session.get(status_url, headers=HEADERS, timeout=15)
                  status_data = safe_json(status_resp)
              except requests.RequestException as e:
                  print(f"⚠️ check failed: {e}")
                  continue

              status = status_data.get('status')
              progress = status_data.get('progress', 0)
              print(f"{status} | {progress}%")

              if status == 'completed':
                  download_url = status_data.get('downloadUrl')
                  if download_url:
                      print("🎉 Completed successfully!")
                      break
                  # completed without URL – treat as failure
                  print("❌ Completed but no downloadUrl – aborting")
                  sys.exit(1)
              elif status == 'failed':
                  print("❌ Conversion failed:", status_data.get('error', 'unknown'))
                  sys.exit(1)
              elif status == 'error':
                  print("❌ Service returned error:", json.dumps(status_data, indent=2))
                  sys.exit(1)
              elif status not in ('pending', 'processing'):
                  print(f"❌ Unexpected status '{status}' – aborting")
                  print(json.dumps(status_data, indent=2))
                  sys.exit(1)

          if not download_url:
              print("⏰ Timeout – conversion took too long")
              sys.exit(1)

          # generate safe filename with timestamp to avoid collisions
          video_id_match = re.search(r'(?:v=|\/)([a-zA-Z0-9_-]{11})', YT_URL)
          video_id = video_id_match.group(1) if video_id_match else "unknown"
          safe_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))[:60].strip('_') or video_id
          timestamp = time.strftime("%Y%m%d-%H%M%S")
          ext = "mp3" if OUTPUT_TYPE == 'audio' else "mp4"
          quality_label = QUALITY
          filename = f"{safe_title}_{video_id}_{quality_label}_{timestamp}.{ext}"

          with open('/tmp/metadata.txt', 'w', encoding='utf-8') as f:
              f.write(f"{download_url}\n{filename}\n{safe_title}\n{OUTPUT_TYPE}\n{QUALITY}\n")

          print(f"📥 Download URL: {download_url[:80]}...")
          print(f"📄 Filename: {filename}")
          print(f"🎵 Type: {OUTPUT_TYPE} | Quality: {QUALITY}")
          PYEOF
        env:
          YT_URL: ${{ github.event.inputs.url }}
          OUTPUT_TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}

      - name: ⬇️ Download and Validate File
        run: |
          set -euo pipefail
          DOWNLOAD_URL=$(sed -n '1p' /tmp/metadata.txt)
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          OUTPUT_TYPE=$(sed -n '4p' /tmp/metadata.txt)
          QUALITY=$(sed -n '5p' /tmp/metadata.txt)

          mkdir -p ./downloads/temp

          echo "⬇️ Downloading $OUTPUT_TYPE @ $QUALITY..."
          echo "📄 File: $FILENAME"

          # get expected size to adjust timeout
          EXPECTED_SIZE=$(curl -sI -L "$DOWNLOAD_URL" | grep -i content-length | awk 'END{print $2}' | tr -d '\r')
          if [[ -n "$EXPECTED_SIZE" ]]; then
            EXPECTED_MB=$((EXPECTED_SIZE / 1048576))
            echo "📏 Expected size: ${EXPECTED_MB} MB"
            TIMEOUT=900   # 15 min for large files
          else
            TIMEOUT=600
          fi

          # download with --fail, speed-based stall detection
          for attempt in 1 2; do
            echo "🔄 Download attempt $attempt..."
            HTTP_CODE=$(curl -sS -w "%{http_code}" -L \
              --fail \
              --speed-limit 1024 --speed-time 30 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0" \
              -H "Referer: https://media.ytmp3.gg/" \
              -o "./downloads/temp/$FILENAME" \
              --max-time "$TIMEOUT" \
              "$DOWNLOAD_URL" 2>&1 | tail -1)

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ HTTP 200 received"
              break
            else
              echo "⚠️ Download attempt $attempt returned HTTP $HTTP_CODE"
              rm -f "./downloads/temp/$FILENAME"
              sleep 5
            fi
          done

          if [[ ! -f "./downloads/temp/$FILENAME" ]]; then
            echo "❌ Download failed completely"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "./downloads/temp/$FILENAME")
          FILE_SIZE_MB=$((FILE_SIZE / 1048576))

          if [[ $FILE_SIZE -lt 10240 ]]; then
            echo "❌ Downloaded file too small (${FILE_SIZE_MB} MB), likely an error page"
            exit 1
          fi

          echo "📏 Actual size: ${FILE_SIZE_MB} MB"

          # media integrity check with ffprobe
          echo "🔍 Verifying media integrity..."
          ffprobe -v error -show_entries stream=codec_type,duration \
            -of default=noprint_wrappers=1 "./downloads/temp/$FILENAME" > /tmp/ffprobe.txt 2>&1 || true

          if ! grep -q "codec_type" /tmp/ffprobe.txt; then
            echo "❌ ffprobe found no valid streams – file may be corrupt"
            cat /tmp/ffprobe.txt
            exit 1
          fi

          DURATION=$(grep -oP 'duration=\K[0-9.]+' /tmp/ffprobe.txt | head -1)
          if [[ -n "$DURATION" ]] && (( $(echo "$DURATION < 0.5" | bc -l) )); then
            echo "❌ Media duration too short (<0.5s), likely invalid"
            exit 1
          fi
          echo "✅ Media integrity OK (duration: ${DURATION:-unknown}s)"

          # check content-type (heuristic)
          CONTENT_TYPE=$(curl -sI -L "$DOWNLOAD_URL" | grep -i content-type | awk 'END{print $2}' | tr -d '\r;\n')
          if [[ -n "$CONTENT_TYPE" ]]; then
            if [[ $OUTPUT_TYPE == 'video' && "$CONTENT_TYPE" != *video* ]]; then
              echo "⚠️ Content-Type mismatch: expected video/*, got '$CONTENT_TYPE'"
            elif [[ $OUTPUT_TYPE == 'audio' && "$CONTENT_TYPE" != *audio* && "$CONTENT_TYPE" != *mpeg* ]]; then
              echo "⚠️ Content-Type mismatch: expected audio/*, got '$CONTENT_TYPE'"
            else
              echo "📋 Content-Type: $CONTENT_TYPE"
            fi
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Downloaded: $FILENAME (${FILE_SIZE_MB} MB)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ✂️ Smart Split & Safety Limit
        run: |
          set -euo pipefail
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          HARD_LIMIT_MB=90   # GitHub push safety limit

          # validate threshold (accept 0, positive integers; treat floats as int)
          if [[ "$THRESHOLD_MB" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            THRESHOLD_MB=$(printf "%.0f" "$THRESHOLD_MB")
          else
            echo "❌ Invalid split threshold: $THRESHOLD_MB"
            exit 1
          fi

          echo "📐 Split threshold (user): ${THRESHOLD_MB} MB"
          echo "🛡️ Hard push limit: ${HARD_LIMIT_MB} MB"

          process_file() {
            local file="$1"
            local size
            size=$(stat -c%s "$file")
            local basename
            basename=$(basename "$file")
            local size_mb=$((size / 1048576))

            local split_size="${THRESHOLD_MB}"
            # forced split if file exceeds hard limit and splitting is disabled or threshold > hard limit
            if [[ $split_size -eq 0 || $split_size -gt $HARD_LIMIT_MB ]]; then
              if [[ $size -gt $((HARD_LIMIT_MB * 1048576)) ]]; then
                echo "🛡️ File ${basename} (${size_mb}MB) exceeds hard push limit → force-splitting at ${HARD_LIMIT_MB}MB"
                split_size="$HARD_LIMIT_MB"
              else
                # no splitting needed
                echo "📁 $basename (${size_mb}MB) — no split required"
                mv "$file" "./downloads/"
                return
              fi
            fi

            if [[ $split_size -gt 0 && $size -gt $((split_size * 1048576)) ]]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✂️ Splitting $basename (${size_mb}MB) into ${split_size}MB parts"
              cd ./downloads
              zip -r -s "${split_size}m" "${basename}.zip" "temp/${basename}" || {
                echo "❌ Zip failed"
                exit 1
              }
              cd ..
              # verify parts exist
              shopt -s nullglob
              parts=( "./downloads/${basename}".z* "./downloads/${basename}.zip" )
              if [[ ${#parts[@]} -eq 0 ]]; then
                echo "❌ No split parts found!"
                exit 1
              fi
              echo "✅ Split into ${#parts[@]} parts"
              if [[ -f "$file" ]]; then
                rm "$file"
              fi
            else
              echo "📁 $basename (${size_mb}MB) — under split threshold"
              mv "$file" "./downloads/"
            fi
          }

          export -f process_file
          export THRESHOLD_MB HARD_LIMIT_MB

          if [[ -d ./downloads/temp ]]; then
            find ./downloads/temp -type f -exec bash -c 'process_file "$1"' _ {} \;
            rm -rf ./downloads/temp
          else
            echo "ℹ️ No temp files to process"
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Final deliverables in ./downloads/:"
          ls -lh ./downloads/ 2>/dev/null | tail -n +2 | awk '{print "  • " $NF " (" $5 ")"}'
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📤 Commit & Push (with retry)
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ ! -d ./downloads ]]; then
            echo "ℹ️ No downloads directory – nothing to commit"
            exit 0
          fi

          git add ./downloads/

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          TOTAL_FILES=$(git diff --staged --name-only | wc -l)
          echo "📦 Committing $TOTAL_FILES file(s)"

          git commit -m "chore: add YouTube content [skip ci]"

          for attempt in 1 2 3; do
            echo "🚀 Push attempt $attempt..."
            if git pull --rebase origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "✅ Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "⚠️ Push failed, waiting 15 seconds..."
            sleep 15
          done
          echo "❌ Push failed after 3 attempts"
          exit 1
