name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 YouTube Video URL'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never (default 1800 MB, near release limit)'
        required: false
        type: number
        default: 1800

jobs:
  download-and-release:
    name: 🚀 Download & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 🔧 Install Dependencies (with retry)
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "🔄 apt-get attempt $i..."
            sudo apt-get update && sudo apt-get install -y zip curl jq ffmpeg gh && break || sleep 10
          done
          pip install requests

      - name: 🎯 Request Conversion & Generate Release Info
        id: converter
        run: |
          set -euo pipefail
          python3 << 'PYEOF'
          import os, sys, json, time, re
          import requests

          YT_URL = os.environ['YT_URL']
          OUTPUT_TYPE = os.environ['OUTPUT_TYPE']
          QUALITY = os.environ.get('QUALITY', '720p')
          RUN_ID = os.environ['GITHUB_RUN_ID']

          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 150
          RETRY_MAX = 3

          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']

          # ------ helpers ------
          def safe_json(resp):
              try:
                  return resp.json()
              except Exception:
                  print(f"❌ Non-JSON response (HTTP {resp.status_code}): {resp.text[:300]}")
                  sys.exit(1)

          def retryable_request(method, url, session, **kwargs):
              last_exc = None
              for i in range(RETRY_MAX):
                  try:
                      resp = session.request(method, url, timeout=30, **kwargs)
                      if resp.status_code < 500 and resp.status_code != 429:
                          return resp
                      print(f"⚠️ Retryable status {resp.status_code} – attempt {i+1}/{RETRY_MAX}")
                  except requests.RequestException as e:
                      last_exc = e
                      print(f"⚠️ Request error, retry {i+1}/{RETRY_MAX}: {e}")
                  time.sleep((2 ** i) * 1.5)
              if last_exc:
                  raise last_exc
              return resp

          # ------ quality normalization (4k mapping fix) ------
          def normalize_quality(output_type, quality_input):
              try:
                  quality = quality_input.lower().strip()
                  quality_map = {'4k':'1080p','2k':'1080p','2160p':'1080p','1440p':'1080p','240p':'360p'}
                  if output_type == 'audio':
                      quality = quality.replace('p', '')
                      if 'kbps' not in quality:
                          quality = quality.rstrip('k') + 'kbps' if quality.endswith('k') else quality + 'kbps'
                      if quality in AUDIO_BITRATES:
                          return quality
                      try:
                          num = int(''.join(filter(str.isdigit, quality)))
                          best = min(AUDIO_BITRATES, key=lambda b: abs(int(''.join(filter(str.isdigit, b))) - num))
                      except:
                          best = '192kbps'
                      print(f"🔄 Audio fallback from '{quality_input}' → {best}")
                      return best
                  else:  # video
                      if quality in quality_map:
                          return quality_map[quality]
                      quality = quality.replace('k', '')
                      if not quality.endswith('p'):
                          quality += 'p'
                      if quality in VIDEO_QUALITIES:
                          return quality
                      if quality in quality_map:
                          return quality_map[quality]
                      print(f"🔄 Video fallback from '{quality_input}' → 720p")
                      return '720p'
              except Exception:
                  return '720p' if output_type == 'video' else '192kbps'

          # validate type
          if OUTPUT_TYPE not in ('video', 'audio'):
              print(f"⚠️ Unknown type '{OUTPUT_TYPE}', forcing to video")
              OUTPUT_TYPE = 'video'

          QUALITY = normalize_quality(OUTPUT_TYPE, QUALITY)

          print(f"🎯 Target: {OUTPUT_TYPE.upper()} @ {QUALITY}")
          print("="*50)

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }

          session = requests.Session()

          try:
              session.get("https://media.ytmp3.gg/", headers=HEADERS, timeout=15)
          except requests.RequestException as e:
              print(f"❌ Preflight failed: {e}")
              sys.exit(1)

          payload = {
              "url": YT_URL,
              "os": "linux",
              "output": {
                  "type": OUTPUT_TYPE,
                  "format": "mp3" if OUTPUT_TYPE == 'audio' else "mp4",
              }
          }
          if OUTPUT_TYPE == 'audio':
              payload["audio"] = {"bitrate": QUALITY}
          else:
              payload["output"]["quality"] = QUALITY

          print(f"📤 Requesting conversion...")
          print(f"📋 Payload: {json.dumps(payload, indent=2)}")

          try:
              response = retryable_request("POST", API_ENDPOINT, session, json=payload, headers=HEADERS)
              if response.status_code != 200:
                  print(f"❌ API error ({response.status_code}): {response.text[:300]}")
                  if response.status_code == 400:
                      if OUTPUT_TYPE == 'audio':
                          payload["audio"]["bitrate"] = "192kbps"
                      else:
                          payload["output"]["quality"] = "720p"
                      response = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                      if response.status_code != 200:
                          print(f"❌ Fallback also failed ({response.status_code})")
                          sys.exit(1)
                  else:
                      sys.exit(1)
              data = safe_json(response)
          except requests.RequestException as e:
              print(f"❌ Request failed: {e}")
              sys.exit(1)

          status_url = data.get('statusUrl')
          title = data.get('title', 'youtube_video')
          if not status_url:
              print("❌ No statusUrl in response")
              print(json.dumps(data, indent=2))
              sys.exit(1)

          print(f"✅ Registered: {title}")
          print("="*50)

          # ------ adaptive polling with while loop ------
          download_url = None
          last_progress = -1
          stall_count = 0
          attempt = 0
          max_attempts = MAX_ATTEMPTS
          while attempt < max_attempts:
              attempt += 1
              time.sleep(STATUS_CHECK_INTERVAL)
              print(f"🔄 Status [{attempt}/{max_attempts}]...", end=' ')
              try:
                  status_resp = session.get(status_url, headers=HEADERS, timeout=15)
                  status_data = safe_json(status_resp)
              except requests.RequestException as e:
                  print(f"⚠️ check failed: {e}")
                  continue

              status = status_data.get('status')
              progress = status_data.get('progress', 0)
              print(f"{status} | {progress}%")

              if status == 'completed':
                  download_url = status_data.get('downloadUrl')
                  if download_url:
                      print("🎉 Completed successfully!")
                      break
                  print("❌ Completed but no downloadUrl – aborting")
                  sys.exit(1)
              elif status in ('failed', 'error'):
                  print(f"❌ Conversion {status}: " + json.dumps(status_data.get('error', {})))
                  sys.exit(1)
              elif status not in ('pending', 'processing'):
                  print(f"❌ Unexpected status '{status}' – aborting")
                  print(json.dumps(status_data, indent=2))
                  sys.exit(1)

              if progress > last_progress:
                  last_progress = progress
                  stall_count = 0
                  if attempt >= max_attempts - 5 and max_attempts < 300:
                      max_attempts += 30
                      print(f"   ↳ Progress still climbing, extended limit to {max_attempts}")
              else:
                  stall_count += 1
                  if stall_count >= 10:
                      print("⏰ Progress stalled for 10 checks – aborting")
                      sys.exit(1)

          if not download_url:
              print("⏰ Conversion did not complete in time")
              sys.exit(1)

          # ------ identifiers ------
          video_id_match = re.search(r'(?:v=|\/)([a-zA-Z0-9_-]{11})', YT_URL)
          video_id = video_id_match.group(1) if video_id_match else "unknown"
          safe_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))[:60].strip('_') or video_id
          timestamp = time.strftime("%Y%m%d-%H%M%S")
          ext = "mp3" if OUTPUT_TYPE == 'audio' else "mp4"
          filename = f"{safe_title}_{video_id}_{QUALITY}_{timestamp}.{ext}"

          tag = f"download-{video_id}-{timestamp}-{RUN_ID}"
          release_name = f"{title} ({QUALITY})"
          release_notes = f"**URL:** {YT_URL}\n**Type:** {OUTPUT_TYPE}\n**Quality:** {QUALITY}\n**Downloaded:** {timestamp}"

          with open('/tmp/metadata.txt', 'w', encoding='utf-8') as f:
              f.write(f"{download_url}\n{filename}\n{OUTPUT_TYPE}\n{QUALITY}\n{status_url}\n")
          with open('/tmp/release_info.txt', 'w', encoding='utf-8') as f:
              f.write(f"tag={tag}\nname={release_name}\nnotes={release_notes}\n")

          print(f"📥 Download URL: {download_url[:80]}...")
          print(f"📄 Filename: {filename}")
          print(f"🏷️  Release tag: {tag}")
          PYEOF
        env:
          YT_URL: ${{ github.event.inputs.url }}
          OUTPUT_TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: 💾 Disk Space Check
        run: |
          set -euo pipefail
          AVAIL_KB=$(df /home/runner | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "📀 Available space: ${AVAIL_MB} MB"
          if [[ $AVAIL_MB -lt 3072 ]]; then
            echo "❌ Less than 3 GB free, aborting to avoid disk exhaustion"
            exit 1
          fi

      - name: ⬇️ Download & Validate File
        id: download
        run: |
          set -euo pipefail
          DOWNLOAD_URL=$(sed -n '1p' /tmp/metadata.txt)
          FILENAME=$(sed -n '2p' /tmp/metadata.txt)
          OUTPUT_TYPE=$(sed -n '3p' /tmp/metadata.txt)
          STATUS_URL=$(sed -n '5p' /tmp/metadata.txt)

          TEMP_DIR="./temp-download"
          mkdir -p "$TEMP_DIR"

          echo "⬇️ Downloading $OUTPUT_TYPE..."
          echo "📄 File: $FILENAME"

          EXPECTED_SIZE=$(curl -sI -L "$DOWNLOAD_URL" | grep -i content-length | awk 'END{print $2}' | tr -d '\r')
          if [[ -n "$EXPECTED_SIZE" ]]; then
            EXPECTED_MB=$((EXPECTED_SIZE / 1048576))
            echo "📏 Expected size: ${EXPECTED_MB} MB"
            TIMEOUT=900
          else
            TIMEOUT=600
          fi

          download_file() {
            local url="$1" output="$2"
            curl -sS -w "%{http_code}" -L \
              --fail --speed-limit 1024 --speed-time 30 \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0" \
              -H "Referer: https://media.ytmp3.gg/" \
              -o "$output" --max-time "$TIMEOUT" "$url" 2>&1 | tail -1
          }

          HTTP_CODE=$(download_file "$DOWNLOAD_URL" "$TEMP_DIR/$FILENAME")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠️ First download attempt HTTP $HTTP_CODE – refreshing token..."
            FRESH_URL=$(curl -sS -L \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0" \
              -H "Accept: application/json" "$STATUS_URL" | jq -r '.downloadUrl // empty')
            if [[ -n "$FRESH_URL" && "$FRESH_URL" != "null" ]]; then
              echo "🔄 Got fresh download URL, retrying..."
              HTTP_CODE=$(download_file "$FRESH_URL" "$TEMP_DIR/$FILENAME")
            fi
          fi

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Download failed with HTTP $HTTP_CODE"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "$TEMP_DIR/$FILENAME")
          FILE_SIZE_MB=$((FILE_SIZE / 1048576))
          if [[ $FILE_SIZE -lt 10240 ]]; then
            echo "❌ File too small (${FILE_SIZE_MB} MB) – suspect error page"
            exit 1
          fi
          echo "📏 Size: ${FILE_SIZE_MB} MB"

          echo "🔍 Verifying media integrity..."
          ffprobe -v error -show_entries stream=codec_type,duration \
            -of default=noprint_wrappers=1 "$TEMP_DIR/$FILENAME" > /tmp/ffprobe.txt 2>&1 || true
          if ! grep -q "codec_type" /tmp/ffprobe.txt; then
            echo "❌ No valid streams found"
            cat /tmp/ffprobe.txt
            exit 1
          fi
          DURATION=$(grep -oP 'duration=\K[0-9.]+' /tmp/ffprobe.txt | head -1)
          if [[ -n "$DURATION" ]] && (( $(echo "$DURATION < 0.5" | bc -l) )); then
            echo "❌ Media too short (<0.5s) – likely invalid"
            exit 1
          fi
          echo "✅ Media integrity OK (duration: ${DURATION:-unknown}s)"

          CONTENT_TYPE=$(curl -sI -L "$DOWNLOAD_URL" | grep -i '^Content-Type:' | awk 'END{print $2}' | tr -d '\r;')
          if [[ -n "$CONTENT_TYPE" ]]; then
            echo "📋 Content-Type: $CONTENT_TYPE"
          fi

          mkdir -p ./release-assets
          mv "$TEMP_DIR/$FILENAME" "./release-assets/"
          echo "✅ File staged for release: $FILENAME"

      - name: ✂️ Optional Split (convenience)
        if: ${{ github.event.inputs.split_threshold_mb > 0 }}
        run: |
          set -euo pipefail
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          if [[ "$THRESHOLD_MB" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            THRESHOLD_MB=$(printf "%.0f" "$THRESHOLD_MB")
          else
            echo "❌ Invalid split threshold: $THRESHOLD_MB"
            exit 1
          fi
          if [[ $THRESHOLD_MB -le 0 ]]; then
            echo "ℹ️ Split disabled (threshold=0)"
            exit 0
          fi

          cd ./release-assets
          for file in *; do
            [[ -f "$file" ]] || continue
            size=$(stat -c%s "$file")
            size_mb=$((size / 1048576))
            if [[ $size -gt $((THRESHOLD_MB * 1048576)) ]]; then
              echo "✂️ Splitting $file ($size_mb MB) into ${THRESHOLD_MB}MB parts..."
              zip -r -s "${THRESHOLD_MB}m" "${file}.zip" "$file"
              shopt -s nullglob
              parts=("${file}".z* "${file}.zip")
              if [[ ${#parts[@]} -gt 0 ]]; then
                echo "✅ Created ${#parts[@]} parts, removing original"
                rm "$file"
              else
                echo "❌ Split failed"
                exit 1
              fi
            else
              echo "📁 $file ($size_mb MB) – under threshold, kept as single file"
            fi
          done
          cd ../..

      - name: 🚀 Create GitHub Release (with retry)
        run: |
          set -euo pipefail
          TAG=$(grep '^tag=' /tmp/release_info.txt | cut -d= -f2-)
          NAME=$(grep '^name=' /tmp/release_info.txt | cut -d= -f2-)
          NOTES=$(grep '^notes=' /tmp/release_info.txt | cut -d= -f2-)
          REPO="${{ github.repository }}"
          GITHUB_SHA="${{ github.sha }}"

          if [[ ! -d ./release-assets ]] || [[ -z $(ls -A ./release-assets 2>/dev/null) ]]; then
            echo "❌ No files in release-assets/"
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "🚀 Release attempt $attempt..."
            if gh release create "$TAG" ./release-assets/* \
                --title "$NAME" \
                --notes "$NOTES" \
                --repo "$REPO" \
                --target "$GITHUB_SHA"; then
              echo "✅ Release published: https://github.com/$REPO/releases/tag/${TAG}"
              exit 0
            fi
            echo "⚠️ Release creation failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ Release creation failed after 3 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
